services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paynext

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: DockerFile
    restart: unless-stopped
    environment:
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      FRONTEND_ACCEPT_INVITE_PATH: ${FRONTEND_ACCEPT_INVITE_PATH:-/accept-invite}
      FRONTEND_RESET_PASSWORD_PATH: ${FRONTEND_RESET_PASSWORD_PATH:-/reset-password}
    networks:
      - paynext
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  core-monolith:
    build:
      context: ./backend/core-monolith
      dockerfile: DockerFile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      NOTIFICATION_SERVICE_URL: http://notification-service:8081
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_BASE_URL:-http://localhost:3000}
    ports:
      - "${CORE_PORT:-8080}:8080"
    networks:
      - paynext
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://core-monolith:8080}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    restart: unless-stopped
    depends_on:
      core-monolith:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://core-monolith:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - paynext

volumes:
  postgres_data:

networks:
  paynext:
    driver: bridge
